# Minimal CI: typecheck + lint. `pnpm install` runs the `prepare` step, whose
# `generate-types` loads the GI namespaces at runtime — hence the gir1.2-*
# packages below. node-gtk itself installs a prebuilt binary when one matches
# the runner's Node ABI; the -dev packages cover the source-build fallback.
# The GTK test suite is not run here (it needs a display server); run it
# locally with `pnpm test`.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK introspection libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gir1.2-gtk-4.0 gir1.2-adw-1 gir1.2-gtksource-5 gir1.2-vte-3.91 \
            libgirepository1.0-dev libcairo2-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install

      - run: pnpm run typecheck

      - run: pnpm run lint
